<script>
let jobs = [];
let resumes = [];
let currentFilter = '';
let selectedStatus = 'pending';
let parsedJdKeywords = [];

async function loadData() {
    try {
        const [jobsRes, resumesRes, statsRes, funnelRes] = await Promise.all([
            authFetch('/api/jobs'), authFetch('/api/resumes'), authFetch('/api/stats'), authFetch('/api/funnel')
        ]);
        jobs = await jobsRes.json();
        resumes = await resumesRes.json();
        const stats = await statsRes.json();
        const funnel = await funnelRes.json();

        document.getElementById('statMonthly').innerHTML = `${stats.monthlyApplications||0} <span class="text-base font-normal text-gray-400">份</span>`;
        document.getElementById('statInterviewing').innerHTML = `${stats.interviewing||0} <span class="text-base font-normal text-gray-400">个</span>`;
        document.getElementById('statOffer').innerHTML = `${stats.offers||0} <span class="text-base font-normal text-gray-400">个</span>`;
        const rate = stats.totalApplications > 0 ? ((stats.interviewing / stats.totalApplications) * 100).toFixed(0) : '--';
        document.getElementById('statRate').innerHTML = `${rate} <span class="text-base font-normal text-gray-400">%</span>`;

        document.getElementById('fnScreening').textContent = funnel.screening;
        document.getElementById('fnFirst').textContent = funnel.firstInterview;
        document.getElementById('fnFinal').textContent = funnel.finalInterview;
        document.getElementById('fnOffer').textContent = funnel.offer;
    } catch (e) { jobs = []; }
    renderJobs();
    initFunnelChart();
    renderCalendar();
}

function renderJobs() {
    const list = document.getElementById('jobList');
    let filtered = currentFilter ? jobs.filter(j => j.status === currentFilter) : jobs;
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (q) filtered = filtered.filter(j => j.title?.toLowerCase().includes(q) || j.company?.toLowerCase().includes(q));

    if (filtered.length === 0) {
        list.innerHTML = `<div class="bg-white rounded-2xl border border-gray-100 p-12 text-center">
        <span class="iconify text-5xl text-gray-200 mb-4 block" data-icon="solar:folder-empty-bold-duotone"></span>
        <p class="text-gray-500 font-medium">${jobs.length === 0 ? '还没有岗位，创建一个开始投递吧' : '没有符合条件的岗位'}</p>
        ${jobs.length === 0 ? '<button onclick="showCreateModal()" class="mt-4 px-6 py-2 ai-gradient text-white rounded-xl text-sm font-bold">创建第一个岗位</button>' : ''}
        </div>`;
        return;
    }

    const statusMap = {
        pending: { label: '未投递', bg: 'bg-gray-100', text: 'text-gray-600', border: 'border-gray-200' },
        applied: { label: '投递中', bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-200' },
        interviewing: { label: '面试中', bg: 'bg-purple-100', text: 'text-purple-700', border: 'border-purple-200' },
        offer: { label: 'Offer', bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200' },
        rejected: { label: '已拒绝', bg: 'bg-red-100', text: 'text-red-700', border: 'border-red-200' }
    };

    list.innerHTML = filtered.map(j => {
        const s = statusMap[j.status] || statusMap.pending;
        return `<div class="bg-white rounded-2xl border ${s.border} shadow-sm p-6 hover:shadow-md transition-all cursor-pointer" onclick="openJobDetail('${j.id}')">
        <div class="flex items-start justify-between">
        <div class="flex-1">
        <div class="flex items-center gap-3 mb-2">
        <h4 class="font-bold text-gray-800">${j.title || '岗位名称'}</h4>
        <span class="px-3 py-1 ${s.bg} ${s.text} text-xs font-bold rounded-full">${s.label}</span>
        </div>
        <p class="text-sm text-gray-500 mb-2">${j.company || '公司名称'} · ${j.location || '地点未知'}${j.salary ? ' · ' + j.salary : ''}</p>
        <div class="flex items-center gap-4 text-xs text-gray-400 flex-wrap">
        <span>创建: ${j.createdAt ? new Date(j.createdAt).toLocaleDateString() : '--'}</span>
        ${j.linkedResumeId ? `<span class="text-blue-600">已关联简历</span>` : ''}
        ${j.interviewTime ? `<span class="text-purple-600">📅 ${j.interviewTime}</span>` : ''}
        ${j.note ? `<span class="text-gray-500">${j.note}</span>` : ''}
        </div>
        </div>
        <div class="flex items-center gap-2 ml-4">
        <button onclick="event.stopPropagation(); deleteJob('${j.id}')" class="p-2 hover:bg-red-50 rounded-xl text-gray-300 hover:text-red-500 transition-all">
        <span class="iconify" data-icon="solar:trash-bold"></span>
        </button>
        </div>
        </div></div>`;
    }).join('');

    // Update interview list
    const interviews = jobs.filter(j => j.status === 'interviewing' && j.interviewDate);
    const il = document.getElementById('interviewList');
    if (interviews.length === 0) {
        il.innerHTML = '<div class="text-center text-gray-400 text-xs py-2">暂无面试安排</div>';
    } else {
        il.innerHTML = interviews.map(j => `<div class="p-3 bg-purple-50 rounded-xl">
        <div class="flex items-center gap-2 mb-1"><span class="w-2 h-2 bg-purple-500 rounded-full"></span><span class="text-xs font-bold text-purple-700">${j.interviewDate} ${j.interviewTime||''}</span></div>
        <p class="text-sm text-gray-700">${j.title} · ${j.company}</p>
        ${j.note ? `<p class="text-xs text-gray-500 mt-1">${j.note}</p>` : ''}
        </div>`).join('');
    }
}

function filterByStatus(status) {
    currentFilter = status;
    document.querySelectorAll('.status-filter-btn').forEach(btn => {
        const s = btn.dataset.status;
        if (s === status) {
            btn.className = 'px-4 py-1.5 rounded-xl text-xs font-bold status-filter-btn active-filter';
        } else {
            btn.className = 'px-4 py-1.5 rounded-xl text-xs font-bold text-gray-500 bg-white border border-gray-200 hover:border-gray-400 transition-all';
        }
    });
    renderJobs();
}

// Create Job Modal
function showCreateModal() {
    document.getElementById('createModal').classList.remove('hidden');
    document.getElementById('createModal').classList.add('flex');
    document.getElementById('jobTitle').value = '';
    document.getElementById('jobCompany').value = '';
    document.getElementById('jobLocation').value = '';
    document.getElementById('jobSalary').value = '';
    document.getElementById('jobJdText').value = '';
    document.getElementById('jdFileInput').value = '';
    document.getElementById('jdFileInfo').classList.add('hidden');
    document.getElementById('jdNoFile').classList.remove('hidden');
    document.getElementById('jdTagsPreview').innerHTML = '';
    document.getElementById('interviewReminderSection').classList.add('hidden');
    document.getElementById('linkResumeSection').classList.add('hidden');
    selectedStatus = 'pending';
    updateStatusButtons();
    updateLinkedResumeOptions();
}

function hideCreateModal() {
    document.getElementById('createModal').classList.add('hidden');
    document.getElementById('createModal').classList.remove('flex');
}

function selectStatus(status) {
    selectedStatus = status;
    updateStatusButtons();
    document.getElementById('interviewReminderSection').classList.toggle('hidden', status !== 'interviewing');
    document.getElementById('linkResumeSection').classList.toggle('hidden', status === 'pending');
    if (status === 'interviewing') {
        // Set default date to tomorrow
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('interviewDate').value = tomorrow.toISOString().split('T')[0];
        document.getElementById('interviewTime').value = '10:00';
    }
}

function updateStatusButtons() {
    const map = { pending: ['gray-400','gray-600'], applied: ['amber-500','amber-600'], interviewing: ['purple-500','purple-600'], offer: ['emerald-500','emerald-600'], rejected: ['red-500','red-600'] };
    document.querySelectorAll('.job-status-btn').forEach(btn => {
        const s = btn.dataset.status;
        const [ic, fc] = map[s] || ['gray-400','gray-600'];
        btn.className = `job-status-btn p-3 border-2 ${s===selectedStatus?'border-blue-500 bg-blue-50':s==='applied'?'border-amber-200':s==='interviewing'?'border-purple-200':s==='offer'?'border-emerald-200':s==='rejected'?'border-red-200':'border-gray-200'} rounded-xl text-center hover:border-gray-400 transition-all`;
        btn.querySelector('.iconify').className = `iconify text-lg ${s===selectedStatus?'text-blue-500':s==='applied'?'text-amber-500':s==='interviewing'?'text-purple-500':s==='offer'?'text-emerald-500':s==='rejected'?'text-red-500':'text-gray-400'}`;
    });
}

function updateLinkedResumeOptions() {
    const select = document.getElementById('linkedResume');
    select.innerHTML = '<option value="">-- 选择简历 --</option>' +
        resumes.map(r => `<option value="${r.id}">${r.name}${r.score?' (AI:'+r.score+')':''}</option>`).join('');
}

function handleJdFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('jdNoFile').classList.add('hidden');
    document.getElementById('jdFileInfo').classList.remove('hidden');
    document.getElementById('jdFileName').textContent = '📄 ' + file.name;
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('jobJdText').value = e.target.result;
        parseJdForPreview(e.target.result);
    };
    reader.readAsText(file);
}

function clearJdFile() {
    document.getElementById('jdFileInput').value = '';
    document.getElementById('jdNoFile').classList.remove('hidden');
    document.getElementById('jdFileInfo').classList.add('hidden');
}

async function parseJdForPreview(text) {
    if (!text.trim()) return;
    document.getElementById('jdParseLoading').classList.remove('hidden');
    try {
        const res = await authFetch('/api/ai/parse-jd', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ jd: text })
        });
        const data = await res.json();
        parsedJdKeywords = data.tags || [];
        const preview = document.getElementById('jdTagsPreview');
        preview.innerHTML = parsedJdKeywords.slice(0, 12).map(t => `<span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-xs rounded-full border border-blue-100">${t.name}</span>`).join('');
        if (parsedJdKeywords.length > 12) preview.innerHTML += `<span class="text-xs text-gray-400">+${parsedJdKeywords.length - 12}</span>`;
    } catch (e) {}
    document.getElementById('jdParseLoading').classList.add('hidden');
}

// JD text change → auto-parse
document.getElementById('jobJdText')?.addEventListener('input', debounce(function() {
    parseJdForPreview(this.value);
}, 800));

// Drag & drop
const jdDz = document.getElementById('jdDropZone');
jdDz.addEventListener('dragover', e => { e.preventDefault(); jdDz.classList.add('dragover'); });
jdDz.addEventListener('dragleave', () => jdDz.classList.remove('dragover'));
jdDz.addEventListener('drop', e => {
    e.preventDefault(); jdDz.classList.remove('dragover');
    if (e.dataTransfer.files[0]) { document.getElementById('jdFileInput').files = e.dataTransfer.files; handleJdFileSelect(document.getElementById('jdFileInput')); }
});

async function createJob() {
    const title = document.getElementById('jobTitle').value.trim();
    const company = document.getElementById('jobCompany').value.trim();
    if (!title || !company) { alert('请填写岗位名称和公司名称'); return; }

    const job = {
        title,
        company,
        location: document.getElementById('jobLocation').value.trim(),
        salary: document.getElementById('jobSalary').value.trim(),
        jdText: document.getElementById('jobJdText').value.trim(),
        status: selectedStatus,
        linkedResumeId: selectedStatus !== 'pending' ? document.getElementById('linkedResume').value : null,
        interviewDate: selectedStatus === 'interviewing' ? document.getElementById('interviewDate').value : null,
        interviewTime: selectedStatus === 'interviewing' ? document.getElementById('interviewTime').value : null,
        note: selectedStatus === 'interviewing' ? document.getElementById('interviewNote').value.trim() : null
    };

    try {
        const res = await authFetch('/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(job)
        });
        console.log('Create job response status:', res.status);
        if (!res.ok) {
            const errText = await res.text();
            console.error('Create job failed:', errText);
            alert('创建失败: ' + errText);
            return;
        }
        const newJob = await res.json();
        console.log('Created job:', newJob);
        jobs.push(newJob);
        renderJobs();
        hideCreateModal();
    } catch (e) { console.error('Create job error:', e); alert('创建失败: ' + e.message); }
}

async function deleteJob(id) {
    if (!confirm('确定删除该岗位？')) return;
    await authFetch(`/api/jobs/${id}`, { method: 'DELETE' });
    jobs = jobs.filter(j => j.id !== id);
    renderJobs();
}

function openJobDetail(id) {
    window.location.href = `job-detail.html?id=${id}`;
}

function exportJobs() {
    if (jobs.length === 0) return;
    const csv = ['岗位,公司,地点,状态,创建时间'].concat(
        jobs.map(j => `"${j.title}","${j.company}","${j.location||''}","${j.status}","${j.createdAt?new Date(j.createdAt).toLocaleDateString():''}"`)
    ).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `岗位列表_${new Date().toLocaleDateString()}.csv`;
    a.click();
}

function initFunnelChart() {
    const c = echarts.init(document.getElementById('funnelChart'));
    c.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
        xAxis: { type: 'value', show: false },
        yAxis: { type: 'category', data: ['简历通过','初试','复试','Offer'], axisLine: { show: false }, axisTick: { show: false }, axisLabel: { fontSize: 11 } },
        series: [{
            type: 'bar',
            data: [
                { value: 76, itemStyle: { color: '#93C5FD', borderRadius: [8,8,8,8] } },
                { value: 38, itemStyle: { color: '#818CF8', borderRadius: [8,8,8,8] } },
                { value: 12, itemStyle: { color: '#A78BFA', borderRadius: [8,8,8,8] } },
                { value: 3, itemStyle: { color: '#34D399', borderRadius: [8,8,8,8] } }
            ],
            barWidth: 16
        }]
    });
    window.addEventListener('resize', () => c.resize());
}

function renderCalendar() {
    const grid = document.getElementById('calendarGrid');
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const interviewDays = jobs.filter(j => j.status === 'interviewing' && j.interviewDate).map(j => parseInt(j.interviewDate.split('-')[2]));

    let html = '';
    for (let i = 0; i < firstDay; i++) html += '<div></div>';
    for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === now.getDate();
        const hasInterview = interviewDays.includes(d);
        html += `<div class="p-1.5 text-center rounded-lg ${isToday?'bg-blue-500 text-white':hasInterview?'bg-purple-100 text-purple-700':'hover:bg-gray-50'} text-xs cursor-pointer">${d}</div>`;
    }
    grid.innerHTML = html;
}

function debounce(fn, delay) {
    let timer;
    return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
}

async function checkAuth() {
    try {
        const res = await authFetch('/api/auth/me');
        if (!res.ok) { window.location.href = 'login.html?redirect=applications.html'; return null; }
        const user = await res.json();
        document.getElementById('navUsername').textContent = user.username;
        document.getElementById('menuLogout').classList.remove('hidden');
        return user;
    } catch { window.location.href = 'login.html?redirect=applications.html'; return null; }
}

async function logout() {
    await authFetch('/api/auth/logout', { method: 'POST' });
    localStorage.removeItem('jobpilot_token');
    localStorage.removeItem('jobpilot_user');
    window.location.href = 'login.html';
}

function authFetch(url, options = {}) {
    const token = localStorage.getItem('jobpilot_token');
    if (token) {
        options.headers = { ...options.headers, 'Authorization': 'Bearer ' + token };
    }
    return fetch(url, options);
}

document.addEventListener('DOMContentLoaded', () => {
    const navUser = document.getElementById('navUser');
    const userMenu = document.getElementById('userMenu');
    navUser?.addEventListener('click', () => userMenu?.classList.toggle('hidden'));
    document.addEventListener('click', (e) => { if (!e.target.closest('.group')) userMenu?.classList.add('hidden'); });
});

document.getElementById('searchInput').addEventListener('input', () => renderJobs());
checkAuth().then(() => loadData());
</script>
